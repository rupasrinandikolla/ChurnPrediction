
<!DOCTYPE html>
<html>
<head>
    <title>Churn Prediction</title>

    <style>

        body{
            font-family: Arial;
            background-color: #f2f2f2;
            text-align: center;
            padding-top: 50px;
        }

        .container{
            background: white;
            width: 400px;
            margin: auto;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        input{
            width: 90%;
            padding: 10px;
            margin: 10px;
        }

        button{
            padding: 10px 20px;
            background-color: blue;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover{
            background-color: darkblue;
        }

    </style>

</head>

<body>

    <div class="container">

        <h1>Customer Churn Prediction</h1>

        <form action="/predict" method="post">

            <input type="text" name="gender" placeholder="Gender (0 Female, 1 Male)" required>

            <input type="text" name="SeniorCitizen" placeholder="Senior Citizen (0 or 1)" required>

            <input type="text" name="MonthlyCharges" placeholder="Monthly Charges" required>

            <input type="text" name="TotalCharges" placeholder="Total Charges" required>

            <button type="submit">Predict</button>

        </form>

        <h2>{{ prediction_text }}</h2>

    </div>

</body>
</html>
